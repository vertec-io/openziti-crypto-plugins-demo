name: validate-prebuilt

on:
  push:
    branches: [prebuilt-images]
  pull_request:
    branches: [prebuilt-images]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

concurrency:
  group: validate-prebuilt-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pull-verify-matrix:
    name: pull-verify-matrix
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: docker compose pull
        run: docker compose pull

      - name: Verify pulled digests match image-manifest.txt
        run: |
          set -euo pipefail
          registry="ghcr.io/vertec-io/openziti-crypto-plugins-demo"
          fail=0
          while IFS= read -r line; do
            case "$line" in
              '#'*|'') continue ;;
            esac
            name="${line%%=*}"
            rest="${line#*=}"
            tag="${rest%%=*}"
            expected_digest="${rest#*=}"
            ref="${registry}/${name}:${tag}"
            actual="$(docker inspect --format '{{index .RepoDigests 0}}' "$ref" 2>/dev/null || true)"
            actual_digest="${actual##*@}"
            if [ -z "$actual_digest" ] || [ "$actual_digest" = "$actual" ]; then
              echo "ERROR: could not resolve RepoDigests for $ref"
              fail=1
              continue
            fi
            if [ "$actual_digest" != "$expected_digest" ]; then
              echo "ERROR: digest mismatch for $name"
              echo "  expected: $expected_digest"
              echo "  actual:   $actual_digest"
              fail=1
            else
              echo "OK: $name -> $actual_digest"
            fi
          done < image-manifest.txt
          if [ "$fail" -ne 0 ]; then
            echo "One or more images failed digest verification."
            exit 1
          fi

      - name: Start infrastructure
        run: docker compose up -d

      - name: Wait for ready
        run: bash ./scripts/wait-for-ready.sh 180

      - name: Run interop matrix
        run: bash ./runmatrix.sh --all

      - name: Upload evidence artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: interop-evidence
          path: evidence/

      - name: Post matrix summary on PR
        if: github.event_name == 'pull_request' && always()
        run: |
          if [ -f evidence/matrix-summary.txt ]; then
            {
              echo '### Cipher Interop Matrix Results'
              echo '```'
              cat evidence/matrix-summary.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Tear down
        if: always()
        run: docker compose down -v
