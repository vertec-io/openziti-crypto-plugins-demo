# prebuilt-images branch — services reference GHCR-published images from the
# most recent main push. Regenerate via: gh workflow run publish-images.yml
# (on main) + run sync-from-main.yml to open a new PR against this branch.

x-controller-image: &controller-image ghcr.io/vertec-io/openziti-crypto-plugins-demo/ziti-controller:sha-d2b87dd4e71b
x-router-image: &router-image ghcr.io/vertec-io/openziti-crypto-plugins-demo/ziti-router:sha-d2b87dd4e71b
x-go-image: &go-image ghcr.io/vertec-io/openziti-crypto-plugins-demo/sample-go:sha-d2b87dd4e71b
x-c-image: &c-image ghcr.io/vertec-io/openziti-crypto-plugins-demo/sample-c:sha-d2b87dd4e71b
x-jvm-image: &jvm-image ghcr.io/vertec-io/openziti-crypto-plugins-demo/sample-jvm:sha-d2b87dd4e71b

services:
  init-pki:
    image: *controller-image
    container_name: init-pki
    extra_hosts:
      - "ziti-controller:127.0.0.1"
      - "ziti-router:127.0.0.1"
    entrypoint: ["bash", "/scripts/init-pki.sh"]
    volumes:
      - ziti-data:/data
      - ./docker/ziti/init-pki.sh:/scripts/init-pki.sh:ro
    networks:
      - ziti-net

  ziti-controller:
    image: *controller-image
    container_name: ziti-controller
    command: ["controller", "run", "/data/quickstart/ctrl.yaml"]
    depends_on:
      init-pki:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "ziti", "edge", "login", "https://ziti-controller:1280", "-u", "admin", "-p", "admin123", "-y", "--ca", "/data/pki/root-ca/certs/root-ca.cert"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    volumes:
      - ziti-data:/data
    networks:
      - ziti-net

  ziti-router:
    image: *router-image
    container_name: ziti-router
    command: ["router", "run", "/data/quickstart/router-quickstart.yaml"]
    depends_on:
      ziti-controller:
        condition: service_healthy
    volumes:
      - ziti-data:/data
    networks:
      - ziti-net

  init-config:
    image: *controller-image
    container_name: init-config
    entrypoint: ["bash", "/scripts/init-config.sh"]
    depends_on:
      ziti-controller:
        condition: service_healthy
      ziti-router:
        condition: service_started
    volumes:
      - ziti-data:/data
      - ./docker/ziti/init-config.sh:/scripts/init-config.sh:ro
    networks:
      - ziti-net

  go-sdk:
    image: *go-image
    container_name: go-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

  c-sdk:
    image: *c-image
    container_name: c-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

  jvm-sdk:
    image: *jvm-image
    container_name: jvm-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

volumes:
  ziti-data:

networks:
  ziti-net:
    driver: bridge
