# Pinned fork SHAs from hook-enabled forks, branch feature/crypto-extensibility
# Source: pinned-shas.txt
x-ziti-sha: &ziti-sha "d9a20d9dad8c58f098f989eb1668ed657c0500c5"
x-sdk-golang-sha: &sdk-golang-sha "6c0300dc1b3b739088f13d71a841ad6914af817b"
x-ziti-sdk-c-sha: &ziti-sdk-c-sha "53f2c67763797d53466ab5f786660fa26fce4939"
x-ziti-sdk-jvm-sha: &ziti-sdk-jvm-sha "67e91851c81ba6b82db1d768bf6673e187cc036a"

services:
  init-pki:
    build:
      context: ./docker/ziti
      dockerfile: Dockerfile
      target: ziti-controller
      args:
        ZITI_SHA: *ziti-sha
    image: openziti-controller-from-harness:local
    container_name: init-pki
    extra_hosts:
      - "ziti-controller:127.0.0.1"
      - "ziti-router:127.0.0.1"
    entrypoint: ["bash", "/scripts/init-pki.sh"]
    volumes:
      - ziti-data:/data
      - ./docker/ziti/init-pki.sh:/scripts/init-pki.sh:ro
    networks:
      - ziti-net

  ziti-controller:
    build:
      context: ./docker/ziti
      dockerfile: Dockerfile
      target: ziti-controller
      args:
        ZITI_SHA: *ziti-sha
    image: openziti-controller-from-harness:local
    container_name: ziti-controller
    command: ["controller", "run", "/data/quickstart/ctrl.yaml"]
    depends_on:
      init-pki:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "ziti", "edge", "login", "https://ziti-controller:1280", "-u", "admin", "-p", "admin123", "-y", "--ca", "/data/pki/root-ca/certs/root-ca.cert"]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s
    volumes:
      - ziti-data:/data
    networks:
      - ziti-net

  ziti-router:
    build:
      context: ./docker/ziti
      dockerfile: Dockerfile
      target: ziti-router
      args:
        ZITI_SHA: *ziti-sha
    image: openziti-router-from-harness:local
    container_name: ziti-router
    command: ["router", "run", "/data/quickstart/router-quickstart.yaml"]
    depends_on:
      ziti-controller:
        condition: service_healthy
    volumes:
      - ziti-data:/data
    networks:
      - ziti-net

  init-config:
    image: openziti-controller-from-harness:local
    container_name: init-config
    entrypoint: ["bash", "/scripts/init-config.sh"]
    depends_on:
      ziti-controller:
        condition: service_healthy
      ziti-router:
        condition: service_started
    volumes:
      - ziti-data:/data
      - ./docker/ziti/init-config.sh:/scripts/init-config.sh:ro
    networks:
      - ziti-net

  go-sdk:
    build:
      context: ./sample/go
      dockerfile: Dockerfile
      additional_contexts:
        plugin: ./reference-plugin/go
      args:
        SDK_GOLANG_SHA: *sdk-golang-sha
    image: openziti-go-sdk-samples:local
    container_name: go-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

  c-sdk:
    build:
      context: ./sample/c
      dockerfile: Dockerfile
      args:
        ZITI_SDK_C_SHA: *ziti-sdk-c-sha
    image: openziti-c-sdk-samples:local
    container_name: c-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

  jvm-sdk:
    build:
      context: ./sample/jvm
      dockerfile: Dockerfile
      args:
        ZITI_SDK_JVM_SHA: *ziti-sdk-jvm-sha
    image: openziti-jvm-sdk-samples:local
    container_name: jvm-sdk-build
    entrypoint: ["echo", "build-only"]
    profiles:
      - build-only

volumes:
  ziti-data:

networks:
  ziti-net:
    driver: bridge
